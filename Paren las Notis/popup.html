<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLM Notifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="container">
    <!-- Banner -->
    <div class="banner">
      <img src="images/upscalemedia-transformed.jpeg" alt="Paren la Mano" class="banner-img" />

      <!-- Developer Info Button -->
      <button class="btn-info" id="btnInfo" title="Información">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="16" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12.01" y2="8"></line>
        </svg>
      </button>
    </div>

    <!-- Search and Options -->
    <div class="search-options-row">
      <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Buscá el programa que quieras..." />
      </div>

      <div class="options-container">
        <button class="btn-options" id="btnOptions">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="1.5" fill="currentColor"></circle>
            <circle cx="12" cy="12" r="1.5" fill="currentColor"></circle>
            <circle cx="12" cy="19" r="1.5" fill="currentColor"></circle>
          </svg>
        </button>
        <div class="options-dropdown" id="optionsDropdown">
          <!-- Zoom Controls -->
          <div class="dropdown-zoom">
            <span class="zoom-label">Tamaño: <span id="zoomValue">100%</span></span>
            <div class="zoom-buttons">
              <button class="btn-zoom" id="btnZoomOut" title="Reducir tamaño">−</button>
              <button class="btn-zoom" id="btnZoomReset" title="Tamaño original">↺</button>
              <button class="btn-zoom" id="btnZoomIn" title="Aumentar tamaño">+</button>
            </div>
          </div>
          <div class="dropdown-divider"></div>

          <button class="dropdown-item" id="btnMarkAllSeen">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            Marcar todos como vistos
          </button>
          <button class="dropdown-item" id="btnMarkAllUnseen">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <line x1="3" y1="3" x2="21" y2="21" />
            </svg>
            Desmarcar todos los vistos
          </button>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="unseen">
        <svg class="tab-icon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor"
          stroke-width="1.5">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
        <span>no vistos</span>
      </button>
      <button class="tab" data-tab="recent">
        <svg class="tab-icon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor"
          stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        <span>recientes</span>
      </button>
      <button class="tab" data-tab="favorites">
        <svg class="tab-icon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
          </path>
        </svg>
        <span>favoritos</span>
      </button>
    </div>

    <!-- Video List -->
    <div class="video-list" id="videoList">
      <!-- Videos rendered dynamically by popup.js -->
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"
        class="empty-icon">
        <path
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 00-5-5.917V4a1 0 10-2 0v1.083A6 6 0 006 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
      <p class="empty-title">Ningún episodio detectado</p>
      <p class="empty-desc">Estamos monitoreando el canal.<br />Te avisaremos en cuanto suba un nuevo Paren la Mano.</p>
    </div>

    <!-- Info Modal -->
    <div class="info-modal" id="infoModal" style="display: none;">
      <div class="info-content">
        <button class="btn-close-info" id="btnCloseInfo">✕</button>
        <h2 class="info-title" style="margin-top: 5px;">Paren las Notis</h2>
        <p class="info-text" style="margin-bottom: 12px; margin-top: 10px;">Extensión creada con cariño de un fan para
          fans del queridisimo Paren La Mano. Se agradece mucho un follow :) </p>

        <a href="https://www.instagram.com/tabbidm02?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw=="
          target="_blank" class="info-link">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
          </svg>
          @tabbidm02
        </a>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
